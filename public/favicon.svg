<svg xmlns="http://www.w3.org/2000/svg" viewBox="11.1 11.1 98 98" role="img" aria-label="Greenbriar Technology Group">
  <!-- transparent background; each shape sits on a slightly fatter dark copy of
       itself, leaving a thin outline so the mark stays legible on any surface.
       The G's arc is a circle centered at (60 60), radius 40, so the mark sits
       with equal margins on all four sides of the viewBox. -->
  <path d="M86.8 30.3 A 40 40 0 1 0 100 62 L86 62" fill="none" stroke="#14150f" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M86.8 30.3 A 40 40 0 1 0 100 62 L86 62" fill="none" stroke="#2bd49a" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- the Shanahan Ridge mineshaft headframe in burnt orange, filling the G's
       bowl: 45° shed roof on the left, center gable, and the half-height
       landing on the right hooking over the G's bar. Sized and placed for
       equal 2-unit clearance to the G's dark edge at the gable peak (top), the
       bottom-left corner, and the bottom-right corner. Painted after the G, so
       the landing sits in front of the bar. -->
  <g transform="translate(30.32 20.9) scale(0.7066)">
    <polygon points="56,16 84,44 84,58 68,58 68,88 16,88 16,68 44,40 44,28"
             fill="#14150f" stroke="#14150f" stroke-width="4.25" stroke-linejoin="round"/>
    <polygon points="56,16 84,44 84,58 68,58 68,88 16,88 16,68 44,40 44,28"
             fill="#e2691f"/>
  </g>
</svg>
